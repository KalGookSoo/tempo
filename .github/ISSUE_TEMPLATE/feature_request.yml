name: 기능 요청
description: 새로운 기능/개선을 제안해 주세요.
title: "[기능] "
labels: [enhancement]
assignees: []
body:
  - type: textarea
    id: summary
    attributes:
      label: 기능 요약
      description: 제안하는 기능을 한두 문장으로 요약해 주세요.
      placeholder: 예) 대용량 업로드 진행률을 표시하고 일시중지/재개를 지원합니다.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: 문제/배경
      description: 어떤 문제나 니즈 때문에 이 기능이 필요한가요?
      placeholder: 예) 진행 상태를 알 수 없어 사용자 이탈이 발생합니다.
    validations:
      required: false
  - type: textarea
    id: solution
    attributes:
      label: 제안하는 해결 방향
      description: 구현 아이디어나 원하는 동작을 간단히 적어 주세요.
      placeholder: 예) 상단 바에 진행률(%) 표시, 업로드 일시중지/재개 버튼 제공.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: 기대 효과/가치(선택)
      description: 이 기능이 제공할 비즈니스/사용자 가치는 무엇인가요?
      placeholder: 예) 대용량 업로드 UX 개선, 이탈률 감소.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: 고려했던 대안(선택)
      description: 다른 접근이나 대안이 있었다면 적어 주세요.
    validations:
      required: false
  - type: textarea
    id: usecases
    attributes:
      label: 사용 사례/예시(선택)
      description: 실제 사용 시나리오나 화면 흐름 예시가 있으면 적어 주세요.
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: 추가 정보(선택)
      description: 관련 링크, 레퍼런스, 첨부 자료 등.
    validations:
      required: false
  - type: checkboxes
    id: checklist
    attributes:
      label: 체크리스트
      options:
        - label: 중복 제안을 검색했습니다
          required: true
        - label: 기능 범위와 기대 효과를 간단히 정리했습니다
          required: true
