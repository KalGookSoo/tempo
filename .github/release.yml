# GitHub Auto‑generated Release Notes 설정
# 문서: https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes

changelog:
  exclude:
    labels:
      # 릴리스 노트에서 제외할 메타 라벨들
      - duplicate
      - question
  categories:
    - title: "✨ 새로운 기능 및 개선 (Enhancements)"
      labels:
        - enhancement

    - title: "🐛 버그 수정 (Bug Fixes)"
      labels:
        - bug

    - title: "📝 문서 (Documentation)"
      labels:
        - documentation

    - title: "⚙️ 기타 변경 (Other Changes)"
      labels: []
